name: Bootstrap

on:
  push:
    branches: [main]
    paths: ['bootstrap/**']
  pull_request:
    branches: [main]
    paths: ['bootstrap/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: bootstrap/go.mod
      # Test tooling: sops/age for the internal/secrets vault round-trips,
      # talosctl for the internal/talos config-generation tests. Bump via the
      # latest releases of getsops/sops, FiloSottile/age, and siderolabs/talos
      # (talosctl is pinned to the repo's target Talos version for stable output).
      - name: Install sops, age, and talosctl
        run: |
          SOPS_VERSION=v3.13.1
          AGE_VERSION=v1.3.1
          TALOS_VERSION=v1.13.4
          sudo curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL "https://github.com/FiloSottile/age/releases/download/${AGE_VERSION}/age-${AGE_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          sudo install /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
          sudo curl -fsSL "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64" -o /usr/local/bin/talosctl
          sudo chmod +x /usr/local/bin/talosctl
          sops --version
          age --version
          talosctl version --client
      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          working-directory: bootstrap
      - run: go vet ./...
      - run: go test -race -timeout 120s ./...
      - run: go build -o /dev/null .
