name: Terraform

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    branches: [main]
    paths: ['terraform/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: hashicorp/setup-terraform@v4.0.1
      - run: terraform fmt -check
      - run: terraform init -backend=false
      - run: terraform validate
