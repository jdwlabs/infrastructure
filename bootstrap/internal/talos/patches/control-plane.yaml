machine:
  type: controlplane
  install:
    disk: /dev/{{ .DefaultDisk }}
    extraKernelArgs:
      - console=tty0
      - console=ttyS0
  network:
    interfaces:
      - interface: {{ .DefaultNetworkInterface }}
        dhcp: true
    extraHostEntries:
      - ip: {{ .HAProxyIP }}
        aliases:
          - {{ .ControlPlaneEndpoint }}
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"
    extraConfig:
      systemReserved:
        cpu: 250m
        memory: 512Mi
      kubeReserved:
        cpu: 250m
        memory: 512Mi
  kernel:
    modules:
      - name: nvme_tcp
      - name: vfio_pci
      - name: zfs
cluster:
  etcd:
    extraArgs:
      quota-backend-bytes: "4294967296"
      auto-compaction-mode: periodic
      auto-compaction-retention: "1"
      heartbeat-interval: "500"
      election-timeout: "5000"
  apiServer:
    # Trust id_tokens from the platform Dex instance so Headlamp (OIDC
    # client "headlamp") can authenticate users against the API server.
    # The issuer is platform-layer (ArgoCD's Dex) — a deliberate upward
    # coupling: without it no human-facing SSO to the cluster exists.
    # The JWT authenticator initializes lazily, so the apiserver still
    # boots when the issuer is unreachable (e.g. during cluster bootstrap).
    extraArgs:
      oidc-issuer-url: https://argocd.jdwlabs.com/api/dex
      oidc-client-id: headlamp
      oidc-username-claim: email
      oidc-username-prefix: "oidc:"
    certSANs:
      - {{ .ControlPlaneEndpoint }}
      - {{ .HAProxyIP }}
      - 127.0.0.1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - longhorn-system
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 256Mi
  extraManifests:
    - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/main/deploy/standalone-install.yaml
    - https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  allowSchedulingOnControlPlanes: false
---
# virtio_net leaves tx-checksum-ip-generic enabled on flannel's VXLAN link, so
# inner TCP checksums are never filled in after encapsulation; the receiving
# node's conntrack marks those packets INVALID and kube-proxy's nftables rules
# drop them, silently blackholing cross-node pod TCP while ICMP still passes.
# rx-checksumming is fixed-on under virtio_net, so the only lever is sender-side
# tx offload, disabled on every node. The feature set mirrors the interim
# in-cluster DaemonSet (ethtool -K tx-checksum-ip-generic/tx/gso/gro/tso off)
# so behaviour is unchanged while that DaemonSet is retired. Talos re-applies
# this whenever the EthernetSpec reconciles, which covers boot-time creation of
# flannel.1; after flannel upgrades that recreate the link mid-life, re-check
# with `talosctl get ethernetstatus flannel.1`.
apiVersion: v1alpha1
kind: EthernetConfig
name: flannel.1
features:
  tx-checksum-ip-generic: false
  tx-generic-segmentation: false
  tx-tcp-segmentation: false
  tx-tcp6-segmentation: false
  rx-gro: false
---
# Same offload set on the physical uplink as belt-and-braces: encapsulated
# packets leave through this NIC and virtio_net's tx offloads were implicated
# in the same checksum corruption.
apiVersion: v1alpha1
kind: EthernetConfig
name: {{ .DefaultNetworkInterface }}
features:
  tx-checksum-ip-generic: false
  tx-generic-segmentation: false
  tx-tcp-segmentation: false
  tx-tcp6-segmentation: false
  rx-gro: false
