machine:
  type: controlplane
  install:
    disk: /dev/{{ .DefaultDisk }}
    extraKernelArgs:
      - console=tty0
      - console=ttyS0
  network:
    interfaces:
      - interface: {{ .DefaultNetworkInterface }}
        dhcp: true
    extraHostEntries:
      - ip: {{ .HAProxyIP }}
        aliases:
          - {{ .ControlPlaneEndpoint }}
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"
    extraConfig:
      systemReserved:
        cpu: 250m
        memory: 512Mi
      kubeReserved:
        cpu: 250m
        memory: 512Mi
  kernel:
    modules:
      - name: nvme_tcp
      - name: vfio_pci
      - name: zfs
cluster:
  etcd:
    extraArgs:
      quota-backend-bytes: "4294967296"
      auto-compaction-mode: periodic
      auto-compaction-retention: "1"
      heartbeat-interval: "500"
      election-timeout: "5000"
  apiServer:
    certSANs:
      - {{ .ControlPlaneEndpoint }}
      - {{ .HAProxyIP }}
      - 127.0.0.1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - longhorn-system
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 256Mi
  extraManifests:
    - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/main/deploy/standalone-install.yaml
    - https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  allowSchedulingOnControlPlanes: false
